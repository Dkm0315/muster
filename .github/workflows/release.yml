name: Muster Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver version to publish
        required: true
        type: string

# Run the JS actions on the Node 24 runtime instead of the deprecated Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: |
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Create tag
        run: |
          git config user.name "muster-release"
          git config user.email "release@muster.local"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Set versions
        run: |
          for pkg in packages/core packages/cli packages/gateway packages/surface; do
            (cd "$pkg" && npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version)
          done

      - name: Build
        run: pnpm build

      - name: Publish to npm
        # pnpm publish rewrites workspace:* deps to the real version on pack,
        # avoiding the workspace-protocol-in-tarball failure (OpenClaw #12853).
        run: pnpm -r publish --access public --no-git-checks
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          generate_release_notes: true
